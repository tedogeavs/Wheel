<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090b10" />
    <title>Spin Wheel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel controls" aria-labelledby="controls-title">
        <div class="header">
          <div>
            <p class="eyebrow">Decision wheel</p>
            <h1 id="controls-title">Wheel Studio</h1>
          </div>
          <div class="header-actions">
            <div class="counter" id="item-count">4</div>
          </div>
        </div>

        <form class="add-form" id="add-form">
          <label for="item-input">New sector</label>
          <div class="input-row">
            <input
              id="item-input"
              name="item"
              type="text"
              maxlength="120"
              autocomplete="off"
              placeholder="Type an option"
            />
            <button type="submit">Add</button>
          </div>
          <p class="limit-message" id="limit-message" aria-live="polite"></p>
        </form>

        <div class="control-actions" aria-label="Wheel controls">
          <button class="sound-toggle utility-button" id="sound-toggle" type="button" aria-pressed="true">
            <span class="sound-dot" aria-hidden="true"></span>
            <span id="sound-label">Audio on</span>
          </button>
          <button class="reset-button utility-button" id="reset-button" type="button">Reset</button>
        </div>

        <div class="list-top">
          <span>Sectors</span>
          <span id="list-status">Ready</span>
        </div>
        <ul class="items" id="items-list" aria-label="Wheel items"></ul>
      </section>

      <section class="wheel-area" aria-label="Spin wheel">
        <div class="wheel-glow" aria-hidden="true"></div>
        <div class="wheel-wrap">
          <div class="pointer" aria-hidden="true"></div>
          <canvas id="wheel" width="620" height="620"></canvas>
          <button class="spin-button" id="spin-button" type="button">Spin</button>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="result-modal" role="dialog" aria-modal="true" aria-labelledby="result-title">
      <div class="modal">
        <p class="eyebrow">Result</p>
        <h2 id="result-title"></h2>
        <div class="modal-actions">
          <button class="secondary" id="close-modal" type="button">Close</button>
          <button class="danger" id="delete-result" type="button">Delete sector</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="reset-modal" role="dialog" aria-modal="true" aria-labelledby="reset-title">
      <div class="modal modal-compact">
        <p class="eyebrow">Reset wheel</p>
        <h2 id="reset-title">Clear current sectors?</h2>
        <p class="modal-copy">This will restore the default wheel and remove your current list.</p>
        <div class="modal-actions">
          <button class="secondary" id="cancel-reset" type="button">Cancel</button>
          <button class="danger" id="confirm-reset" type="button">Reset</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
